# Server
server.port=8080

# H2 Database (SQL)
spring.datasource.url=jdbc:h2:file:./data/toponymic-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# LLM API Configuration
llm.api.key=your-api-key-here
llm.api.base-url=https://api.siliconflow.cn/v1
llm.classification.model=Qwen/Qwen2.5-7B-Instruct
llm.rag.model=Qwen/Qwen2.5-72B-Instruct
llm.embedding.model=BAAI/bge-m3
llm.api.call-interval-ms=600

# Pipeline
pipeline.save-frequency=5

# CORS
spring.web.cors.allowed-origins=http://localhost:4200

# Logging
logging.level.com.toponymic=DEBUG
